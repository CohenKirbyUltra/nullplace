<html>
    <head>
        <style>
            html {
                background-color: #444444;
            }
        </style>
        <title>BABABABABABA</title>
    </head>
    <body>
        <script>
            var music = new Audio();
            music.src = "src/audio/qqqq.mp3";
            music.loop = true;

            document.addEventListener("click", () => {
                music.play();
            });

            var chuds = 0;
            function CreateChud() {
                let chud = document.createElement("IMG")
                chud.src = "src/imgs/Croakling.png";
                chud.style.width = "500px";
                chud.style.height = "500px";
                chud.id = `chud${chuds}`;
                chuds++;
            }

            setInterval(() => {
                CreateChud()
            }, 100);
        </script>
    </body>
</html>
