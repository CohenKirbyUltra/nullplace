<html>
    <head>
        <style>
            * {
                background-color: black;
            }
        </style>
    </head>

    <body>
        <script>
            var music = new Audio();
            music.src = "src/audio/gone.mp3"
            music.loop = true;
            
            document.addEventListener("click", () => {
                music.play()
            });

            var img = document.getElementById("enter");
            img.style.width = 0;
            img.style.height = 0;

            img.addEventListener("click", () => {
                window.location.href = "index copy.html"
            })
            setInterval(function() {img.style.width++ img.style.height++}, 50)
        </script>
        <img id="enter" src="src/imgs/KnowingEye.png">
    </body>
</html>
